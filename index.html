<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>설문조사 & 통계 리포트</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f0f2f5; color: #1a1a2e; }
  nav { background: #1a1a2e; padding: 0 32px; display: flex; align-items: center; height: 56px; gap: 8px; }
  nav h1 { color: #fff; font-size: 18px; margin-right: 32px; white-space: nowrap; }
  nav button { background: transparent; color: #ffffffbb; border: none; padding: 8px 18px; cursor: pointer; font-size: 14px; border-radius: 6px; transition: .2s; }
  nav button:hover, nav button.active { background: #ffffff22; color: #fff; }
  .page { display: none; max-width: 900px; margin: 32px auto; padding: 0 16px; }
  .page.active { display: block; }
  .card { background: #fff; border-radius: 12px; padding: 28px; margin-bottom: 20px; box-shadow: 0 2px 8px #0001; }
  .card h2 { font-size: 20px; margin-bottom: 16px; color: #1a1a2e; }
  .card h3 { font-size: 16px; margin-bottom: 12px; color: #16213e; }
  label { display: block; font-weight: 600; margin-bottom: 6px; font-size: 14px; }
  input[type=text], input[type=number], input[type=url], textarea, select {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db; border-radius: 8px;
    font-size: 14px; margin-bottom: 14px; outline: none; transition: .2s;
  }
  input:focus, textarea:focus, select:focus { border-color: #4361ee; }
  textarea { resize: vertical; min-height: 60px; }
  .btn { padding: 10px 22px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; transition: .2s; }
  .btn-primary { background: #4361ee; color: #fff; } .btn-primary:hover { background: #3a56d4; }
  .btn-success { background: #2ec4b6; color: #fff; } .btn-success:hover { background: #28b0a3; }
  .btn-danger { background: #e63946; color: #fff; } .btn-danger:hover { background: #cf3240; }
  .btn-secondary { background: #6c757d; color: #fff; } .btn-secondary:hover { background: #5a6268; }
  .btn-outline { background: transparent; border: 1.5px solid #4361ee; color: #4361ee; } .btn-outline:hover { background: #4361ee11; }
  .btn-sm { padding: 6px 14px; font-size: 13px; }
  .q-item { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 18px; margin-bottom: 14px; position: relative; }
  .q-item .q-num { font-weight: 700; color: #4361ee; margin-bottom: 8px; }
  .q-item .q-remove { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #e63946; cursor: pointer; font-size: 18px; }
  .option-row { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; }
  .option-row input { flex: 1; margin-bottom: 0; }
  .option-row button { flex-shrink: 0; }
  .add-option-btn { font-size: 13px; color: #4361ee; background: none; border: none; cursor: pointer; padding: 4px 0; }
  .media-section { background: #f8f9ff; border: 1.5px dashed #c7d2fe; border-radius: 8px; padding: 14px; margin-top: 10px; margin-bottom: 10px; }
  .media-section summary { cursor: pointer; font-size: 13px; font-weight: 600; color: #4361ee; user-select: none; }
  .media-section .media-body { margin-top: 12px; }
  .media-item { display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px; background: #fff; border-radius: 8px; padding: 10px; border: 1px solid #e5e7eb; }
  .media-item select { width: 120px; flex-shrink: 0; margin-bottom: 0; }
  .media-item input { flex: 1; margin-bottom: 0; }
  .media-item button { flex-shrink: 0; align-self: center; }
  .media-preview { margin-top: 8px; }
  .media-preview img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid #e5e7eb; }
  .media-preview video { max-width: 100%; max-height: 300px; border-radius: 8px; }
  .media-preview iframe { width: 100%; aspect-ratio: 16/9; border: none; border-radius: 8px; }
  .media-preview .link-card { display: inline-flex; align-items: center; gap: 8px; padding: 10px 16px; background: #f0f2f5; border-radius: 8px; color: #4361ee; text-decoration: none; font-size: 14px; border: 1px solid #d1d5db; transition: .2s; }
  .media-preview .link-card:hover { background: #e8eaff; border-color: #4361ee; }
  .upload-zone { border: 2px dashed #c7d2fe; border-radius: 8px; padding: 16px; text-align: center; cursor: pointer; transition: .2s; background: #fafaff; margin-bottom: 8px; position: relative; }
  .upload-zone:hover, .upload-zone.dragover { border-color: #4361ee; background: #eef0ff; }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-zone .upload-icon { font-size: 24px; color: #4361ee; margin-bottom: 4px; }
  .upload-zone .upload-text { font-size: 13px; color: #6b7280; }
  .upload-zone .upload-text strong { color: #4361ee; }
  .media-source-toggle { display: inline-flex; border: 1.5px solid #d1d5db; border-radius: 6px; overflow: hidden; margin-bottom: 8px; font-size: 13px; }
  .media-source-toggle button { border: none; background: #fff; padding: 5px 14px; cursor: pointer; font-size: 13px; color: #6b7280; transition: .2s; }
  .media-source-toggle button.active { background: #4361ee; color: #fff; }
  .file-info { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: #f0f2f5; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }
  .file-info .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .file-info .file-size { color: #6b7280; flex-shrink: 0; }
  .survey-card { border: 1.5px solid #e5e7eb; border-radius: 10px; padding: 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
  .survey-card h3 { margin: 0; font-size: 16px; }
  .survey-card .meta { color: #6b7280; font-size: 13px; }
  .survey-card .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .take-q { margin-bottom: 24px; }
  .take-q .q-title { font-weight: 700; font-size: 15px; margin-bottom: 10px; }
  .take-q .q-title .required { color: #e63946; }
  .radio-group label, .check-group label { display: flex; align-items: center; gap: 8px; font-weight: 400; margin-bottom: 8px; cursor: pointer; }
  .radio-group input, .check-group input { width: auto; margin: 0; }
  .scale-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .scale-group label { display: flex; flex-direction: column; align-items: center; gap: 4px; font-weight: 400; cursor: pointer; padding: 8px 12px; border: 1.5px solid #d1d5db; border-radius: 8px; transition: .2s; min-width: 44px; }
  .scale-group label:hover { border-color: #4361ee; }
  .scale-group input:checked + span { color: #4361ee; font-weight: 700; }
  .scale-group input { display: none; }
  .stat-summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .stat-box { background: #f8f9ff; border-radius: 10px; padding: 18px; text-align: center; }
  .stat-box .num { font-size: 28px; font-weight: 800; color: #4361ee; }
  .stat-box .label { font-size: 13px; color: #6b7280; margin-top: 4px; }
  .chart-container { position: relative; width: 100%; max-width: 500px; margin: 16px auto; }
  .response-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
  .response-table th, .response-table td { padding: 8px 12px; border-bottom: 1px solid #e5e7eb; text-align: left; }
  .response-table th { background: #f8f9ff; font-weight: 700; }
  .progress-bar { background: #e5e7eb; border-radius: 6px; height: 22px; overflow: hidden; position: relative; }
  .progress-bar .fill { height: 100%; border-radius: 6px; transition: width .4s; display: flex; align-items: center; padding: 0 8px; color: #fff; font-size: 12px; font-weight: 600; }
  @media print { nav, .no-print { display: none !important; } .page { display: block !important; max-width: 100%; } .card { break-inside: avoid; } }
  .empty-state { text-align: center; padding: 48px 20px; color: #9ca3af; }
  .empty-state p { font-size: 15px; margin-bottom: 16px; }
  .tag { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; }
  .tag-open { background: #d1fae5; color: #065f46; }
  .tag-closed { background: #fee2e2; color: #991b1b; }
  .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 700px) { .compare-grid { grid-template-columns: 1fr; } }
  .compare-col { min-width: 0; }
  .compare-col h4 { font-size: 14px; color: #4361ee; margin-bottom: 10px; padding: 8px 12px; background: #f0f2ff; border-radius: 8px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .compare-col.col-b h4 { color: #e63946; background: #fff0f0; }
  .compare-row { margin-bottom: 24px; }
  .compare-row > .compare-q-title { font-weight: 700; font-size: 15px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e5e7eb; }
  .delta { font-size: 12px; font-weight: 700; margin-left: 6px; }
  .delta.up { color: #059669; } .delta.down { color: #e63946; } .delta.neutral { color: #6b7280; }
  .compare-legend { display: flex; gap: 16px; justify-content: center; margin-bottom: 16px; font-size: 13px; }
  .compare-legend span::before { content: ''; display: inline-block; width: 12px; height: 12px; border-radius: 3px; margin-right: 6px; vertical-align: middle; }
  .compare-legend .leg-a::before { background: #4361ee; } .compare-legend .leg-b::before { background: #e63946; }
  .db-info { position: fixed; bottom: 12px; right: 12px; background: #1a1a2e; color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 12px; opacity: .7; z-index: 99; }
  /* Question Groups */
  .group-manager { background: #f8f9ff; border: 1.5px solid #e0e4ff; border-radius: 10px; padding: 16px; margin-bottom: 18px; }
  .group-manager h4 { font-size: 14px; margin-bottom: 10px; color: #4361ee; }
  .group-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .group-tag { display: inline-flex; align-items: center; gap: 6px; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #d1d5db; background: #fff; transition: .2s; }
  .group-tag:hover { border-color: #4361ee; }
  .group-tag.active { background: #4361ee; color: #fff; border-color: #4361ee; }
  .group-tag .group-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .group-tag .group-remove { background: none; border: none; cursor: pointer; font-size: 14px; color: inherit; opacity: .6; padding: 0 2px; }
  .group-tag .group-remove:hover { opacity: 1; }
  .group-add-row { display: flex; gap: 8px; }
  .group-add-row input { flex: 1; margin-bottom: 0; padding: 7px 12px; font-size: 13px; }
  .group-add-row button { flex-shrink: 0; }
  .q-item .q-group-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; color: #fff; margin-left: 8px; vertical-align: middle; }
  .q-item .q-group-select { font-size: 13px; padding: 4px 10px; border-radius: 6px; border: 1.5px solid #d1d5db; background: #fff; margin-bottom: 10px; }
  .take-group-header { background: linear-gradient(135deg, #4361ee11, #2ec4b611); border-left: 4px solid #4361ee; padding: 14px 18px; border-radius: 0 10px 10px 0; margin-bottom: 16px; margin-top: 28px; }
  .take-group-header:first-child { margin-top: 0; }
  .take-group-header h3 { font-size: 16px; color: #1a1a2e; margin: 0; }
  .take-group-header p { font-size: 13px; color: #6b7280; margin: 4px 0 0 0; }
  .report-group-header { background: linear-gradient(135deg, #4361ee15, #2ec4b615); border-radius: 12px; padding: 18px 24px; margin-bottom: 16px; margin-top: 28px; }
  .report-group-header h3 { font-size: 17px; color: #1a1a2e; margin: 0; display: flex; align-items: center; gap: 10px; }
  .report-group-header h3 .group-dot { width: 12px; height: 12px; border-radius: 50%; }
  .report-group-header p { font-size: 13px; color: #6b7280; margin: 4px 0 0 0; }
  .group-container { border-left: 3px solid #e5e7eb; padding-left: 12px; margin-bottom: 8px; }
  .group-container.dragging-over { border-left-color: #4361ee; background: #f0f2ff; border-radius: 0 8px 8px 0; }
  /* Auth UI */
  .nav-spacer { flex: 1; }
  .auth-area { display: flex; align-items: center; gap: 10px; margin-left: auto; }
  .auth-area .user-profile { display: flex; align-items: center; gap: 8px; color: #fff; font-size: 13px; }
  .auth-area .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #4361ee; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: #fff; flex-shrink: 0; }
  .auth-area .user-name { font-weight: 600; line-height: 1.2; }
  .auth-area .user-dept { font-size: 11px; color: #ffffffaa; }
  .auth-area .user-email { font-size: 11px; color: #ffffffaa; }
  .btn-ms-login { display: inline-flex; align-items: center; gap: 8px; background: #fff; color: #5e5e5e; border: none; padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; transition: .2s; }
  .btn-ms-login:hover { background: #f0f0f0; }
  .btn-ms-login svg { width: 18px; height: 18px; }
  .btn-ms-logout { background: transparent; color: #ffffffaa; border: 1px solid #ffffff44; padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: .2s; }
  .btn-ms-logout:hover { color: #fff; border-color: #fff; }
  .login-required { background: #fff8e1; border: 1.5px solid #ffd54f; border-radius: 10px; padding: 20px; text-align: center; margin-bottom: 20px; }
  .login-required p { color: #795548; font-size: 14px; margin-bottom: 12px; }
  .respondent-tag { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 12px; font-size: 12px; background: #e8eaff; color: #4361ee; font-weight: 600; }
  .dept-chart-section { margin-top: 20px; }
  .btn-ad { background: #0078d4; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: .2s; display: inline-flex; align-items: center; gap: 5px; }
  .btn-ad:hover { background: #106ebe; }
  .btn-ad svg { width: 14px; height: 14px; }
  .dept-filter { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .dept-filter select { margin-bottom: 0; max-width: 300px; }
  .dept-filter label { font-weight: 600; font-size: 14px; margin-bottom: 0; white-space: nowrap; }
  .ad-dept-loading { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; color: #6b7280; padding: 6px 12px; background: #f0f2f5; border-radius: 8px; }
  .ad-dept-loading .spinner { width: 14px; height: 14px; border: 2px solid #d1d5db; border-top-color: #4361ee; border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Category */
  .cat-filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .cat-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid #d1d5db; background: #fff; transition: .2s; user-select: none; }
  .cat-chip:hover { border-color: #4361ee; }
  .cat-chip.active { background: #4361ee; color: #fff; border-color: #4361ee; }
  .cat-chip .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .cat-chip.active .cat-dot { background: #fff !important; }
  .cat-chip .cat-count { font-weight: 400; opacity: .7; font-size: 12px; }
  .tag-category { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; display: inline-block; }
  .cat-select-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .cat-select-row label { margin-bottom: 0; }
  .cat-select-row select { max-width: 240px; margin-bottom: 0; }
</style>
</head>
<body>
<nav>
  <h1>Survey App</h1>
  <button class="active" onclick="showPage('list')">설문 목록</button>
  <button onclick="showPage('create')">설문 만들기</button>
  <button onclick="showPage('compare')">결과 비교</button>
  <div class="auth-area" id="auth-area">
    <button class="btn-ms-login" onclick="msalLogin()" id="btn-login">
      <svg viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Microsoft 로그인
    </button>
  </div>
</nav>

<div id="page-list" class="page active">
  <div class="card">
    <div class="flex-between">
      <h2>설문 목록</h2>
      <button class="btn btn-primary" onclick="showPage('create')">+ 새 설문 만들기</button>
    </div>
    <div class="cat-filter-bar" id="cat-filter-bar"></div>
    <div id="survey-list"><div class="empty-state"><p>로딩 중...</p></div></div>
  </div>
</div>

<div id="page-create" class="page">
  <div class="card">
    <h2 id="create-title">새 설문 만들기</h2>
    <input type="hidden" id="edit-id" value="">
    <label>설문 제목 *</label>
    <input type="text" id="survey-title" placeholder="예: 고객 만족도 조사">
    <label>카테고리 *</label>
    <select id="survey-category">
      <option value="">-- 카테고리 선택 --</option>
      <option value="직원만족도">직원만족도</option>
      <option value="고객만족도">고객만족도</option>
      <option value="제품평가">제품평가</option>
      <option value="교육/연수">교육/연수</option>
      <option value="업무프로세스">업무프로세스</option>
      <option value="조직문화">조직문화</option>
      <option value="이벤트/행사">이벤트/행사</option>
      <option value="기타">기타</option>
    </select>
    <label>설문 설명</label>
    <textarea id="survey-desc" placeholder="설문에 대한 간단한 설명을 입력하세요"></textarea>
  </div>
  <div class="card">
    <div class="group-manager">
      <h4>질문 그룹 관리</h4>
      <div class="group-tags" id="group-tags"></div>
      <div class="group-add-row">
        <input type="text" id="new-group-name" placeholder="새 그룹 이름 (예: 업무 환경, 복리후생)" onkeydown="if(event.key==='Enter')addGroup()">
        <button class="btn btn-outline btn-sm" onclick="addGroup()">+ 그룹 추가</button>
      </div>
    </div>
    <div class="flex-between">
      <h3>질문 목록</h3>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <button class="btn btn-outline btn-sm" onclick="addQuestion('radio')">객관식 (단일)</button>
        <button class="btn btn-outline btn-sm" onclick="addQuestion('checkbox')">객관식 (복수)</button>
        <button class="btn btn-outline btn-sm" onclick="addQuestion('scale')">척도</button>
        <button class="btn btn-outline btn-sm" onclick="addQuestion('text')">주관식</button>
        <button class="btn-ad" onclick="addDeptQuestion()" title="Azure AD 부서 목록을 옵션으로 불러옵니다"><svg viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>AD 부서 질문</button>
      </div>
    </div>
    <div id="questions-builder"></div>
    <div id="no-questions" class="empty-state" style="padding:24px;"><p>아직 질문이 없습니다. 위 버튼으로 질문을 추가하세요.</p></div>
  </div>
  <div style="text-align:right; margin-bottom:40px;">
    <button class="btn btn-secondary" onclick="showPage('list')" style="margin-right:8px;">취소</button>
    <button class="btn btn-success" onclick="saveSurvey()">설문 저장</button>
  </div>
</div>

<div id="page-take" class="page">
  <div class="card">
    <h2 id="take-title"></h2>
    <p id="take-desc" style="color:#6b7280; margin-bottom:20px;"></p>
    <div id="take-questions"></div>
    <div style="text-align:right; margin-top:20px;">
      <button class="btn btn-secondary" onclick="showPage('list')" style="margin-right:8px;">돌아가기</button>
      <button class="btn btn-primary" onclick="submitResponse()">응답 제출</button>
    </div>
  </div>
</div>

<div id="page-compare" class="page">
  <div class="card no-print">
    <h2>설문 결과 비교</h2>

<script>
// =====================================================
// Microsoft MSAL Authentication
// =====================================================
const MSAL_CLIENT_ID = '94dfbb8e-3e2e-40ed-b1e0-0e8f52df7d23';
const MSAL_AUTHORITY = 'https://login.microsoftonline.com/676ac0b7-276a-4e65-82ad-f13e2c55cf8c';

let msalInstance = null;
let currentUser = null; // { name, email, department }

function initMsal() {
  if (MSAL_CLIENT_ID === 'YOUR_AZURE_AD_CLIENT_ID') {
    console.warn('MSAL Client ID가 설정되지 않았습니다. Azure AD 앱 등록 후 MSAL_CLIENT_ID를 교체하세요.');
    return;
  }
  const msalConfig = {
    auth: {
      clientId: MSAL_CLIENT_ID,
      authority: MSAL_AUTHORITY,
      redirectUri: window.location.origin + window.location.pathname
    },
    cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
  };
  msalInstance = new msal.PublicClientApplication(msalConfig);
}

const loginRequest = { scopes: ['User.Read'] };

async function msalLogin() {
  if (!msalInstance) {
    alert('Microsoft 로그인을 사용하려면 Azure AD Client ID를 설정해야 합니다.\n\n코드 상단의 MSAL_CLIENT_ID를 교체하세요.');
    return;
  }
  try {
    const resp = await msalInstance.loginPopup(loginRequest);
    await fetchUserProfile(resp.account);
  } catch (e) {
    console.error('Login failed', e);
    if (e.errorCode !== 'user_cancelled') alert('로그인에 실패했습니다: ' + e.message);
  }
}

async function msalLogout() {
  if (!msalInstance) return;
  currentUser = null;
  sessionStorage.removeItem('msal_user');
  updateAuthUI();
  try { await msalInstance.logoutPopup(); } catch(e) { console.warn('Logout error', e); }
}

async function trySilentLogin() {
  if (!msalInstance) return;
  const accounts = msalInstance.getAllAccounts();
  if (accounts.length > 0) {
    try {
      await msalInstance.acquireTokenSilent({ ...loginRequest, account: accounts[0] });
      await fetchUserProfile(accounts[0]);
    } catch (e) { console.warn('Silent login failed', e); }
  }
}

async function fetchUserProfile(account) {
  try {
    const tokenResp = await msalInstance.acquireTokenSilent({ ...loginRequest, account });
    const resp = await fetch('https://graph.microsoft.com/v1.0/me?$select=displayName,mail,userPrincipalName,department,jobTitle', {
      headers: { 'Authorization': 'Bearer ' + tokenResp.accessToken }
    });
    if (!resp.ok) throw new Error('Graph API error: ' + resp.status);
    const profile = await resp.json();
    currentUser = {
      name: profile.displayName || account.name || '',
      email: profile.mail || profile.userPrincipalName || account.username || '',
      department: profile.department || profile.jobTitle || ''
    };
    sessionStorage.setItem('msal_user', JSON.stringify(currentUser));
    updateAuthUI();
  } catch (e) {
    console.error('Profile fetch failed', e);
    // Fallback: use account info
    currentUser = {
      name: account.name || '',
      email: account.username || '',
      department: ''
    };
    sessionStorage.setItem('msal_user', JSON.stringify(currentUser));
    updateAuthUI();
  }
}

function updateAuthUI() {
  const area = document.getElementById('auth-area');
  if (currentUser) {
    const initials = (currentUser.name || '?').split(' ').map(s => s[0]).join('').slice(0, 2).toUpperCase();
    const deptHtml = currentUser.department ? `<div class="user-dept">${esc(currentUser.department)}</div>` : '';
    area.innerHTML = `
      <div class="user-profile">
        <div class="user-avatar">${initials}</div>
        <div>
          <div class="user-name">${esc(currentUser.name)}</div>
          ${deptHtml}
          <div class="user-email">${esc(currentUser.email)}</div>
        </div>
      </div>
      <button class="btn-ms-logout" onclick="msalLogout()">로그아웃</button>`;
  } else {
    area.innerHTML = `<button class="btn-ms-login" onclick="msalLogin()" id="btn-login">
      <svg viewBox="0 0 21 21"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>
      Microsoft 로그인</button>`;
  }
}

// Restore user from sessionStorage on load
function restoreUser() {
  const saved = sessionStorage.getItem('msal_user');
  if (saved) { try { currentUser = JSON.parse(saved); } catch(e) {} }
}

// =====================================================
// Azure AD Department List
// =====================================================
let cachedDepartments = null; // [{name, count}]

async function fetchADDepartments(forceRefresh) {
  if (cachedDepartments && !forceRefresh) return cachedDepartments;

  // Try cache from IndexedDB first
  if (!forceRefresh) {
    try {
      const cached = await idbGet('meta', 'ad_departments');
      if (cached && cached.ts && Date.now() - cached.ts < 24*60*60*1000) {
        cachedDepartments = cached.data;
        return cachedDepartments;
      }
    } catch(e) {}
  }

  // Need access token
  let accessToken = null;
  if (msalInstance) {
    const accounts = msalInstance.getAllAccounts();
    if (accounts.length > 0) {
      try {
        const tokenResp = await msalInstance.acquireTokenSilent({ ...loginRequest, account: accounts[0] });
        accessToken = tokenResp.accessToken;
      } catch(e) { console.warn('Token acquire failed', e); }
    }
  }
  if (!accessToken) return cachedDepartments || [];

  try {
    let allUsers = [];
    let url = 'https://graph.microsoft.com/v1.0/users?$select=department&$top=999';
    while (url) {
      const resp = await fetch(url, { headers: { 'Authorization': 'Bearer ' + accessToken } });
      if (!resp.ok) break;
      const data = await resp.json();
      allUsers = allUsers.concat(data.value || []);
      url = data['@odata.nextLink'] || null;
    }
    const counts = {};
    allUsers.forEach(u => {
      if (u.department && u.department.trim()) {
        counts[u.department.trim()] = (counts[u.department.trim()] || 0) + 1;
      }
    });
    cachedDepartments = Object.entries(counts)
      .sort((a, b) => b[1] - a[1])
      .map(([name, count]) => ({ name, count }));

    // Cache to IndexedDB (24h TTL)
    try { await idbPut('meta', 'ad_departments', { data: cachedDepartments, ts: Date.now() }); } catch(e) {}
    return cachedDepartments;
  } catch(e) {
    console.error('Failed to fetch departments', e);
    return cachedDepartments || [];
  }
}

// Get top-level grouped departments (merge similar names)
function getMainDepartments(depts, minCount) {
  if (!depts) return [];
  return depts.filter(d => d.count >= (minCount || 5));
}

// =====================================================
// IndexedDB Storage Layer
// =====================================================
const DB_NAME = 'SurveyAppDB';
const DB_VERSION = 1;
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('meta')) db.createObjectStore('meta');
      if (!db.objectStoreNames.contains('blobs')) db.createObjectStore('blobs');
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror = (e) => reject(e.target.error);
  });
}

async function idbGet(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).get(key);
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function idbPut(store, key, value) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).put(value, key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function idbDelete(store, key) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readwrite');
    const req = tx.objectStore(store).delete(key);
    req.onsuccess = () => resolve();
    req.onerror = () => reject(req.error);
  });
}

async function idbGetAllKeys(store) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(store, 'readonly');
    const req = tx.objectStore(store).getAllKeys();
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

// =====================================================
// Data Layer — split blobs from meta
// =====================================================

// Extract data:URL blobs from questions, replace with blob:// ref keys
function extractBlobs(questions) {
  const blobs = {}; // key -> dataURL
  const cleaned = JSON.parse(JSON.stringify(questions));
  cleaned.forEach(q => {
    if (!q.media) return;
    q.media.forEach(m => {
      if (m.url && m.url.startsWith('data:') && m.url.length > 200) {
        const key = 'blob_' + uid();
        blobs[key] = m.url;
        m.url = 'idb://' + key;
      }
    });
  });
  return { cleaned, blobs };
}

// Restore blob refs to data URLs
async function restoreBlobs(questions) {
  const restored = JSON.parse(JSON.stringify(questions));
  for (const q of restored) {
    if (!q.media) continue;
    for (const m of q.media) {
      if (m.url && m.url.startsWith('idb://')) {
        const key = m.url.slice(6);
        const dataUrl = await idbGet('blobs', key);
        m.url = dataUrl || '';
      }
    }
  }
  return restored;
}

async function loadData() {
  try {
    const d = await idbGet('meta', 'appdata');
    return d || { surveys: [], responses: {} };
  } catch { return { surveys: [], responses: {} }; }
}

async function saveData(data) {
  await idbPut('meta', 'appdata', data);
}

// Save survey with blob extraction
async function saveSurveyData(data, surveyQuestions) {
  const { cleaned, blobs } = extractBlobs(surveyQuestions);
  // Save blobs
  for (const [key, val] of Object.entries(blobs)) {
    await idbPut('blobs', key, val);
  }
  return cleaned;
}

// Delete orphan blobs when survey is deleted
async function deleteSurveyBlobs(questions) {
  if (!questions) return;
  for (const q of questions) {
    if (!q.media) continue;
    for (const m of q.media) {
      if (m.url && m.url.startsWith('idb://')) {
        await idbDelete('blobs', m.url.slice(6));
      }
    }
  }
}

// Migrate from localStorage if exists
async function migrateFromLocalStorage() {
  const raw = localStorage.getItem('survey_app_data');
  if (!raw) return;
  try {
    const old = JSON.parse(raw);
    // Extract blobs from each survey
    for (const s of old.surveys) {
      const { cleaned, blobs } = extractBlobs(s.questions);
      s.questions = cleaned;
      for (const [key, val] of Object.entries(blobs)) {
        await idbPut('blobs', key, val);
      }
    }
    await saveData(old);
    localStorage.removeItem('survey_app_data');
    console.log('Migrated from localStorage to IndexedDB');
  } catch (e) { console.error('Migration failed', e); }
}

// =====================================================
// Utils
// =====================================================
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function getMedian(arr) { const sorted = [...arr].sort((a,b)=>a-b); const mid = Math.floor(sorted.length/2); return sorted.length%2 ? sorted[mid] : ((sorted[mid-1]+sorted[mid])/2).toFixed(1); }
function getMode(arr) { const freq={}; arr.forEach(v=>freq[v]=(freq[v]||0)+1); const max=Math.max(...Object.values(freq)); return Object.keys(freq).filter(k=>freq[k]===max).join(', '); }
function getStdDev(arr) { const avg=arr.reduce((a,b)=>a+b,0)/arr.length; return Math.sqrt(arr.reduce((s,v)=>s+(v-avg)**2,0)/arr.length); }
function formatFileSize(bytes) { if(bytes<1024)return bytes+' B'; if(bytes<1024*1024)return (bytes/1024).toFixed(1)+' KB'; return (bytes/(1024*1024)).toFixed(1)+' MB'; }
function csvEsc(v){const s=String(v);return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;}
function getYoutubeEmbedUrl(url){if(!url)return null;let m=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/);return m?'https://www.youtube.com/embed/'+m[1]:null;}

// CATEGORY CONFIG
// =====================================================
const CATEGORIES = {
  '직원만족도':  { color: '#4361ee', bg: '#e8eaff' },
  '고객만족도':  { color: '#2ec4b6', bg: '#d1fae5' },
  '제품평가':    { color: '#fb5607', bg: '#fff0e0' },
  '교육/연수':   { color: '#8338ec', bg: '#f0e6ff' },
  '업무프로세스': { color: '#118ab2', bg: '#dff0fa' },
  '조직문화':    { color: '#06d6a0', bg: '#d4f7ed' },
  '이벤트/행사':  { color: '#e63946', bg: '#fee2e2' },
  '기타':        { color: '#6b7280', bg: '#f0f2f5' }
};

let listCategoryFilter = '';

function getCatStyle(cat) {
  return CATEGORIES[cat] || CATEGORIES['기타'];
}

function renderCatTag(cat) {
  if (!cat) return '';
  const s = getCatStyle(cat);
  return `<span class="tag-category" style="background:${s.bg};color:${s.color};">${esc(cat)}</span>`;
}

// =====================================================
// SURVEY LIST
// =====================================================
async function renderSurveyList() {
  const data = await loadData();
  const el = document.getElementById('survey-list');
  const filterBar = document.getElementById('cat-filter-bar');

  if (!data.surveys.length) {
    el.innerHTML = '<div class="empty-state"><p>등록된 설문이 없습니다.</p></div>';
    filterBar.innerHTML = '';
    return;
  }

  // Build category counts
  const catCounts = {};
  data.surveys.forEach(s => {
    const c = s.category || '기타';
    catCounts[c] = (catCounts[c] || 0) + 1;
  });

  // Render filter chips
  const catOrder = Object.keys(CATEGORIES);
  const activeCats = catOrder.filter(c => catCounts[c]);
  if (activeCats.length > 1) {
    filterBar.innerHTML = `<span class="cat-chip ${!listCategoryFilter?'active':''}" onclick="listCategoryFilter='';renderSurveyList();">전체 (${data.surveys.length})</span>` +
      activeCats.map(c => {
        const s = getCatStyle(c);
        return `<span class="cat-chip ${listCategoryFilter===c?'active':''}" onclick="listCategoryFilter='${c}';renderSurveyList();"><span class="cat-dot" style="background:${s.color}"></span>${esc(c)} <span class="cat-count">${catCounts[c]}</span></span>`;
      }).join('');
  } else {
    filterBar.innerHTML = '';
  }

  // Filter surveys
  const filtered = listCategoryFilter ? data.surveys.filter(s => (s.category||'기타') === listCategoryFilter) : data.surveys;

  if (!filtered.length) {
    el.innerHTML = '<div class="empty-state"><p>해당 카테고리에 설문이 없습니다.</p></div>';
    return;
  }

  el.innerHTML = filtered.map(s => {
    const resCount = (data.responses[s.id]||[]).length;
    const tag = s.closed ? '<span class="tag tag-closed">마감</span>' : '<span class="tag tag-open">진행중</span>';
    const catTag = renderCatTag(s.category);
    const alreadyAnswered=currentUser&&(data.responses[s.id]||[]).some(r=>r.respondent&&r.respondent.email===currentUser.email);
    const answeredTag=alreadyAnswered?'<span class="tag" style="background:#e0e7ff;color:#4361ee;">응답 완료</span>':'';
    return `<div class="survey-card"><div><h3>${esc(s.title)} ${catTag} ${tag} ${answeredTag}</h3><div class="meta">${s.questions.length}개 질문 &middot; ${resCount}건 응답 &middot; ${s.createdAt}</div></div><div class="actions">
      ${s.closed?'':`<button class="btn btn-primary btn-sm" onclick="startTake('${s.id}')">${alreadyAnswered?'재응답':'응답하기'}</button>`}
      <button class="btn btn-success btn-sm" onclick="showReport('${s.id}')">리포트</button>
      ${s.closed?`<button class="btn btn-outline btn-sm" onclick="toggleClose('${s.id}')">재개</button>`:`<button class="btn btn-outline btn-sm" onclick="toggleClose('${s.id}')">마감</button>`}
      <button class="btn btn-outline btn-sm" onclick="editSurvey('${s.id}')">수정</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSurvey('${s.id}')">삭제</button>
    </div></div>`;
  }).join('');
}

async function toggleClose(id) { const data=await loadData(); const s=data.surveys.find(x=>x.id===id); if(s){s.closed=!s.closed; await saveData(data); await renderSurveyList();} }

async function deleteSurvey(id) {
  if(!confirm('이 설문을 삭제하시겠습니까? 응답 데이터도 함께 삭제됩니다.'))return;
  const data=await loadData();
  const s=data.surveys.find(x=>x.id===id);
  if(s) await deleteSurveyBlobs(s.questions);
  data.surveys=data.surveys.filter(s=>s.id!==id);
  delete data.responses[id];
  await saveData(data);
  await renderSurveyList();
}

// =====================================================
// CREATE / EDIT
// =====================================================
let questions = [];
let questionGroups = []; // [{id, name, color}]
const GROUP_COLORS = ['#4361ee','#2ec4b6','#e63946','#ffd166','#06d6a0','#8338ec','#fb5607','#118ab2','#3a86a7','#ff006e'];

function resetCreateForm() {
  document.getElementById('edit-id').value='';
  document.getElementById('survey-title').value='';
  document.getElementById('survey-desc').value='';
  document.getElementById('survey-category').value='';
  document.getElementById('create-title').textContent='새 설문 만들기';
  questions=[];
  questionGroups=[];
  renderGroupTags();
  renderQuestions();
}

function addGroup() {
  const inp=document.getElementById('new-group-name');
  const name=inp.value.trim();
  if(!name)return;
  if(questionGroups.some(g=>g.name===name))return alert('같은 이름의 그룹이 이미 있습니다.');
  questionGroups.push({id:'grp_'+uid(),name,color:GROUP_COLORS[questionGroups.length%GROUP_COLORS.length]});
  inp.value='';
  renderGroupTags();
  renderQuestions();
}

function removeGroup(gid) {
  if(!confirm('이 그룹을 삭제하시겠습니까? 질문은 그대로 유지됩니다.'))return;
  questionGroups=questionGroups.filter(g=>g.id!==gid);
  questions.forEach(q=>{if(q.group===gid)q.group='';});
  renderGroupTags();
  renderQuestions();
}

function renderGroupTags() {
  const el=document.getElementById('group-tags');
  if(!questionGroups.length){el.innerHTML='<span style="font-size:13px;color:#9ca3af;">그룹이 없습니다. 비슷한 질문을 묶어 관리하세요.</span>';return;}
  el.innerHTML=questionGroups.map(g=>{
    const cnt=questions.filter(q=>q.group===g.id).length;
    return `<span class="group-tag"><span class="group-color" style="background:${g.color}"></span>${esc(g.name)} <small style="opacity:.7;">(${cnt})</small><button class="group-remove" onclick="event.stopPropagation();removeGroup('${g.id}')" title="그룹 삭제">&times;</button></span>`;
  }).join('');
}

async function editSurvey(id) {
  const data=await loadData();
  const s=data.surveys.find(x=>x.id===id);
  if(!s)return;
  document.getElementById('edit-id').value=s.id;
  document.getElementById('survey-title').value=s.title;
  document.getElementById('survey-category').value=s.category||'';
  document.getElementById('survey-desc').value=s.description||'';
  document.getElementById('create-title').textContent='설문 수정';
  questions = await restoreBlobs(s.questions);
  questionGroups = s.questionGroups ? JSON.parse(JSON.stringify(s.questionGroups)) : [];
  renderGroupTags();
  renderQuestions();
  await showPage('create');
}

function addQuestion(type) {
  const q={id:uid(),type,title:'',required:true,options:[],media:[],group:''};
  if(type==='radio'||type==='checkbox')q.options=['옵션 1','옵션 2'];
  if(type==='scale'){q.scaleMin=1;q.scaleMax=5;q.labelMin='매우 불만족';q.labelMax='매우 만족';}
  questions.push(q);
  renderQuestions();
}

function renderQuestions() {
  const el=document.getElementById('questions-builder');
  document.getElementById('no-questions').style.display=questions.length?'none':'block';
  const typeLabels={radio:'객관식 (단일)',checkbox:'객관식 (복수)',scale:'척도',text:'주관식'};
  el.innerHTML=questions.map((q,qi)=>{
    if(!q.media)q.media=[];
    let optHtml='';
    if(q.type==='radio'||q.type==='checkbox'){
      optHtml=q.options.map((o,oi)=>`<div class="option-row"><input type="text" value="${esc(o)}" onchange="questions[${qi}].options[${oi}]=this.value" placeholder="옵션"><button class="btn btn-danger btn-sm" onclick="removeOption(${qi},${oi})">&times;</button></div>`).join('')+`<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;"><button class="add-option-btn" onclick="addOption(${qi})">+ 옵션 추가</button><button class="btn-ad" style="font-size:11px;padding:4px 10px;" onclick="loadADOptionsToQuestion(${qi})"><svg viewBox="0 0 21 21" style="width:12px;height:12px;"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>AD 부서 불러오기</button></div>`;
    }
    if(q.type==='scale'){
      optHtml=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;"><div><label>최소값</label><input type="number" value="${q.scaleMin}" onchange="questions[${qi}].scaleMin=+this.value"></div><div><label>최대값</label><input type="number" value="${q.scaleMax}" onchange="questions[${qi}].scaleMax=+this.value"></div><div><label>최소 라벨</label><input type="text" value="${esc(q.labelMin)}" onchange="questions[${qi}].labelMin=this.value"></div><div><label>최대 라벨</label><input type="text" value="${esc(q.labelMax)}" onchange="questions[${qi}].labelMax=this.value"></div></div>`;
    }
    const mediaItems=q.media.map((m,mi)=>{
      const source=m.source||'url';
      const isFile=(m.type==='image'||m.type==='video');
      const hasFile=m.fileName&&m.url&&(m.url.startsWith('data:')||m.url.startsWith('idb://'));
      let inp='';
      if(isFile){
        inp+=`<div class="media-source-toggle"><button class="${source==='url'?'active':''}" onclick="questions[${qi}].media[${mi}].source='url';renderQuestions();">URL 입력</button><button class="${source==='file'?'active':''}" onclick="questions[${qi}].media[${mi}].source='file';renderQuestions();">파일 업로드</button></div>`;
        if(source==='file'){
          if(hasFile){inp+=`<div class="file-info"><span class="file-name">${esc(m.fileName)}</span><span class="file-size">${esc(m.fileSize||'')}</span><button class="btn btn-danger btn-sm" onclick="questions[${qi}].media[${mi}].url='';questions[${qi}].media[${mi}].fileName='';questions[${qi}].media[${mi}].fileSize='';renderQuestions();">제거</button></div>`;}
          else{const acc=m.type==='image'?'image/*':'video/*';inp+=`<div class="upload-zone" ondragover="event.preventDefault();this.classList.add('dragover');" ondragleave="this.classList.remove('dragover');" ondrop="event.preventDefault();this.classList.remove('dragover');handleFileDrop(event,${qi},${mi});"><div class="upload-icon">${m.type==='image'?'&#128247;':'&#127910;'}</div><div class="upload-text"><strong>클릭</strong>하거나 파일을 <strong>드래그</strong>하세요</div><div class="upload-text">${m.type==='image'?'JPG, PNG, GIF, SVG, WebP':'MP4, WebM, OGG'} (최대 50MB)</div><input type="file" accept="${acc}" onchange="handleFileSelect(event,${qi},${mi})"></div>`;}
        }else{inp+=`<input type="url" value="${esc(!hasFile?(m.url||''):'')}" onchange="questions[${qi}].media[${mi}].url=this.value;questions[${qi}].media[${mi}].fileName='';renderQuestions();" placeholder="${m.type==='image'?'이미지 URL':'동영상 URL'}">`;}
      }else if(m.type==='youtube'){inp+=`<input type="url" value="${esc(m.url||'')}" onchange="questions[${qi}].media[${mi}].url=this.value;renderQuestions();" placeholder="YouTube URL">`;}
      else if(m.type==='link'){inp+=`<input type="url" value="${esc(m.url||'')}" onchange="questions[${qi}].media[${mi}].url=this.value;renderQuestions();" placeholder="링크 URL"><input type="text" value="${esc(m.label||'')}" onchange="questions[${qi}].media[${mi}].label=this.value" placeholder="링크 표시 텍스트 (선택)" style="margin-top:-6px;">`;}
      if(m.type==='image'&&source==='url')inp+=`<input type="text" value="${esc(m.alt||'')}" onchange="questions[${qi}].media[${mi}].alt=this.value" placeholder="이미지 설명 (선택)" style="margin-top:-6px;">`;
      return `<div class="media-item"><select onchange="questions[${qi}].media[${mi}].type=this.value;questions[${qi}].media[${mi}].source='url';questions[${qi}].media[${mi}].url='';questions[${qi}].media[${mi}].fileName='';renderQuestions();"><option value="image" ${m.type==='image'?'selected':''}>이미지</option><option value="video" ${m.type==='video'?'selected':''}>동영상</option><option value="youtube" ${m.type==='youtube'?'selected':''}>YouTube</option><option value="link" ${m.type==='link'?'selected':''}>URL 링크</option></select><div style="flex:1;">${inp}</div><button class="btn btn-danger btn-sm" onclick="removeMedia(${qi},${mi})">&times;</button></div>${m.url&&!m.url.startsWith('idb://')?renderMediaPreviewBuilder(m):''}`;
    }).join('');
    const mediaHtml=`<details class="media-section" ${q.media.length?'open':''}><summary>미디어 첨부 ${q.media.length?'<span style="color:#2ec4b6;">('+q.media.length+'개)</span>':''}</summary><div class="media-body">${mediaItems}<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;"><button class="btn btn-outline btn-sm" onclick="addMedia(${qi},'image')">+ 이미지</button><button class="btn btn-outline btn-sm" onclick="addMedia(${qi},'video')">+ 동영상</button><button class="btn btn-outline btn-sm" onclick="addMedia(${qi},'youtube')">+ YouTube</button><button class="btn btn-outline btn-sm" onclick="addMedia(${qi},'link')">+ URL 링크</button></div></div></details>`;
    const grpBadge=q.group&&questionGroups.find(g=>g.id===q.group)?`<span class="q-group-badge" style="background:${questionGroups.find(g=>g.id===q.group).color}">${esc(questionGroups.find(g=>g.id===q.group).name)}</span>`:'';
    const grpSelect=questionGroups.length?`<select class="q-group-select" onchange="questions[${qi}].group=this.value;renderGroupTags();renderQuestions();"><option value="">그룹 없음</option>${questionGroups.map(g=>`<option value="${g.id}" ${q.group===g.id?'selected':''}>${esc(g.name)}</option>`).join('')}</select>`:'';
    return `<div class="q-item"><div class="q-num">Q${qi+1}. ${typeLabels[q.type]}${grpBadge}</div><button class="q-remove" onclick="removeQuestion(${qi})">&times;</button>${grpSelect}<label>질문 *</label><input type="text" value="${esc(q.title)}" onchange="questions[${qi}].title=this.value" placeholder="질문을 입력하세요"><label style="font-weight:400;"><input type="checkbox" ${q.required?'checked':''} onchange="questions[${qi}].required=this.checked" style="width:auto;margin-right:6px;">필수 응답</label>${optHtml}${mediaHtml}</div>`;
  }).join('');
}

function renderMediaPreviewBuilder(m) {
  if(!m.url||m.url.startsWith('idb://'))return '';
  if(m.type==='image')return `<div class="media-preview"><img src="${esc(m.url)}" alt="${esc(m.alt||'')}" onerror="this.style.display='none'"></div>`;
  if(m.type==='video')return `<div class="media-preview"><video src="${esc(m.url)}" controls style="max-height:200px;"></video></div>`;
  if(m.type==='youtube'){const e=getYoutubeEmbedUrl(m.url);return e?`<div class="media-preview"><iframe src="${e}" allowfullscreen style="max-height:250px;"></iframe></div>`:'<p style="color:#e63946;font-size:13px;">유효한 YouTube URL을 입력하세요.</p>';}
  if(m.type==='link')return `<div class="media-preview"><a href="${esc(m.url)}" target="_blank" rel="noopener" class="link-card">&#128279; ${esc(m.label||m.url)}</a></div>`;
  return '';
}

function addMedia(qi,type){if(!questions[qi].media)questions[qi].media=[];questions[qi].media.push({type,url:'',label:'',alt:'',source:'url',fileName:'',fileSize:''});renderQuestions();}
function removeMedia(qi,mi){questions[qi].media.splice(mi,1);renderQuestions();}
function addOption(qi){questions[qi].options.push('옵션 '+(questions[qi].options.length+1));renderQuestions();}
function removeOption(qi,oi){questions[qi].options.splice(oi,1);renderQuestions();}
function removeQuestion(qi){questions.splice(qi,1);renderGroupTags();renderQuestions();}

async function addDeptQuestion() {
  if (!currentUser) { alert('Azure AD 부서 목록을 불러오려면 먼저 Microsoft 로그인이 필요합니다.'); return; }
  const q = {id:uid(), type:'radio', title:'소속 부서를 선택해 주세요.', required:true, options:['로딩 중...'], media:[], group:''};
  questions.push(q);
  renderQuestions();
  try {
    const depts = await fetchADDepartments();
    const main = getMainDepartments(depts, 5);
    q.options = main.map(d => {
      const parts = d.name.split(' _ ');
      return parts.length > 1 ? parts[1].trim() + ' (' + parts[0].trim() + ')' : d.name;

    q.options = ['부서 정보를 불러올 수 없습니다.'];
    renderQuestions();
  }
}

async function loadADOptionsToQuestion(qi) {
  if (!currentUser) { alert('Microsoft 로그인이 필요합니다.'); return; }

    if (q.options.length === 0) q.options = ['부서 정보 없음'];

function processFile(file,qi,mi){
  const m=questions[qi].media[mi];
  const maxSize=50*1024*1024;
  if(file.size>maxSize){alert('파일 크기가 50MB를 초과합니다.');return;}
  if(m.type==='image'&&!file.type.startsWith('image/')){alert('이미지 파일만 업로드 가능합니다.');return;}
  if(m.type==='video'&&!file.type.startsWith('video/')){alert('동영상 파일만 업로드 가능합니다.');return;}
  const reader=new FileReader();
  reader.onload=function(e){
    questions[qi].media[mi].url=e.target.result;
    questions[qi].media[mi].fileName=file.name;
    questions[qi].media[mi].fileSize=formatFileSize(file.size);
    questions[qi].media[mi].source='file';
    renderQuestions();
  };
  reader.readAsDataURL(file);
}
function handleFileSelect(e,qi,mi){const f=e.target.files[0];if(f)processFile(f,qi,mi);}
function handleFileDrop(e,qi,mi){const f=e.dataTransfer.files[0];if(f)processFile(f,qi,mi);}

async function saveSurvey() {
  const title=document.getElementById('survey-title').value.trim();
  const category=document.getElementById('survey-category').value;
  if(!title)return alert('설문 제목을 입력하세요.');
  if(!category)return alert('카테고리를 선택하세요.');
  if(!questions.length)return alert('최소 1개 이상의 질문을 추가하세요.');
  for(let i=0;i<questions.length;i++){if(!questions[i].title.trim())return alert(`Q${i+1}의 질문을 입력하세요.`);}

  const data=await loadData();
  const cleaned=await saveSurveyData(data, questions);
  const editId=document.getElementById('edit-id').value;
  if(editId){
    const idx=data.surveys.findIndex(s=>s.id===editId);
    if(idx>=0){
      await deleteSurveyBlobs(data.surveys[idx].questions);
      data.surveys[idx].title=title;
      data.surveys[idx].category=category;
      data.surveys[idx].description=document.getElementById('survey-desc').value.trim();
      data.surveys[idx].questions=cleaned;
      data.surveys[idx].questionGroups=JSON.parse(JSON.stringify(questionGroups));
    }
  }else{
    data.surveys.push({id:uid(),title,category,description:document.getElementById('survey-desc').value.trim(),questions:cleaned,questionGroups:JSON.parse(JSON.stringify(questionGroups)),createdAt:new Date().toLocaleDateString('ko-KR'),closed:false});
  }
  await saveData(data);
  resetCreateForm();
  await showPage('list');
}

let currentSurveyId=null;

function renderTakeQuestion(q,qi) {
  const req=q.required?'<span class="required"> *</span>':'';
  const media=renderMediaHtml(q.media);
  let inp='';
  if(q.type==='radio')inp=`<div class="radio-group">${q.options.map(o=>`<label><input type="radio" name="q_${qi}" value="${esc(o)}"><span>${esc(o)}</span></label>`).join('')}</div>`;
  if(q.type==='checkbox')inp=`<div class="check-group">${q.options.map(o=>`<label><input type="checkbox" name="q_${qi}" value="${esc(o)}"><span>${esc(o)}</span></label>`).join('')}</div>`;
  if(q.type==='scale'){const nums=[];for(let i=q.scaleMin;i<=q.scaleMax;i++)nums.push(i);inp=`<div style="display:flex;justify-content:space-between;font-size:12px;color:#6b7280;margin-bottom:4px;"><span>${esc(q.labelMin)}</span><span>${esc(q.labelMax)}</span></div><div class="scale-group">${nums.map(n=>`<label><input type="radio" name="q_${qi}" value="${n}"><span>${n}</span></label>`).join('')}</div>`;}
  if(q.type==='text')inp=`<textarea name="q_${qi}" placeholder="답변을 입력하세요" rows="3"></textarea>`;
  return `<div class="take-q"><div class="q-title">Q${qi+1}. ${esc(q.title)}${req}</div>${media}${inp}</div>`;
}

function groupQuestions(qs, groups) {
  if(!groups||!groups.length) return [{group:null,questions:qs.map((q,i)=>({q,qi:i}))}];
  const result=[];
  const grouped={};
  const ungrouped=[];
  groups.forEach(g=>grouped[g.id]=[]);
  qs.forEach((q,qi)=>{
    if(q.group&&grouped[q.group]) grouped[q.group].push({q,qi});
    else ungrouped.push({q,qi});
  });
  groups.forEach(g=>{if(grouped[g.id].length)result.push({group:g,questions:grouped[g.id]});});
  if(ungrouped.length) result.push({group:null,questions:ungrouped});
  return result;
}

async function startTake(id){
  const data=await loadData();
  const s=data.surveys.find(x=>x.id===id);if(!s)return;
  currentSurveyId=id;

  // 로그인 체크
  if(!currentUser){
    document.getElementById('take-title').textContent=s.title;
    document.getElementById('take-desc').textContent=s.description||'';
    document.getElementById('take-questions').innerHTML=`<div class="login-required"><p>설문에 응답하려면 Microsoft 계정으로 로그인해야 합니다.</p><button class="btn-ms-login" onclick="msalLogin().then(()=>{if(currentUser)startTake('${id}');})" style="font-size:15px;padding:10px 24px;"><svg viewBox="0 0 21 21" style="width:20px;height:20px;"><rect x="1" y="1" width="9" height="9" fill="#f25022"/><rect x="11" y="1" width="9" height="9" fill="#7fba00"/><rect x="1" y="11" width="9" height="9" fill="#00a4ef"/><rect x="11" y="11" width="9" height="9" fill="#ffb900"/></svg>Microsoft 계정으로 로그인</button></div>`;
    await showPage('take');
    return;
  }

  // 중복 응답 확인
  const existing=(data.responses[id]||[]).find(r=>r.respondent&&r.respondent.email===currentUser.email);
  if(existing&&!confirm(`이미 ${new Date(existing.submittedAt).toLocaleString('ko-KR')}에 응답하셨습니다.\n다시 응답하시겠습니까? (기존 응답은 유지됩니다)`))return;

  const qs=await restoreBlobs(s.questions);
  document.getElementById('take-title').textContent=s.title;
  document.getElementById('take-desc').textContent=s.description||'';
  const sections=groupQuestions(qs, s.questionGroups);
  let html=`<div style="margin-bottom:16px;"><span class="respondent-tag">&#128100; ${esc(currentUser.name)}${currentUser.department?' / '+esc(currentUser.department):''}</span></div>`;
  sections.forEach(sec=>{
    if(sec.group) html+=`<div class="take-group-header"><h3>${esc(sec.group.name)}</h3><p>${sec.questions.length}개 항목</p></div>`;
    sec.questions.forEach(({q,qi})=>{ html+=renderTakeQuestion(q,qi); });
  });
  document.getElementById('take-questions').innerHTML=html;
  await showPage('take');
}

async function submitResponse(){
  const data=await loadData();
  const s=data.surveys.find(x=>x.id===currentSurveyId);if(!s)return;
  const answers={};
  for(let qi=0;qi<s.questions.length;qi++){
    const q=s.questions[qi];
    if(q.type==='radio'||q.type==='scale'){const c=document.querySelector(`input[name="q_${qi}"]:checked`);answers[qi]=c?c.value:'';}
    else if(q.type==='checkbox'){answers[qi]=Array.from(document.querySelectorAll(`input[name="q_${qi}"]:checked`)).map(c=>c.value);}
    else{const t=document.querySelector(`textarea[name="q_${qi}"]`);answers[qi]=t?t.value.trim():'';}
    if(q.required){const empty=q.type==='checkbox'?!answers[qi].length:!answers[qi];if(empty)return alert(`Q${qi+1}은(는) 필수 항목입니다.`);}
  }
  if(!data.responses[currentSurveyId])data.responses[currentSurveyId]=[];
  const respondent=currentUser?{name:currentUser.name,email:currentUser.email,department:currentUser.department}:{name:'익명',email:'',department:''};
  data.responses[currentSurveyId].push({answers,submittedAt:new Date().toISOString(),respondent});
  await saveData(data);
  alert('응답이 제출되었습니다!');
  await showPage('list');
}

let chartInstances=[];
const COLORS=['#4361ee','#2ec4b6','#ff6b6b','#ffd166','#06d6a0','#118ab2','#8338ec','#fb5607','#3a86a7','#e63946'];

let reportDeptFilter = '';

function applyDeptFilter() {
  reportDeptFilter = document.getElementById('report-dept-select').value;

async function showReport(id){
  const data=await loadData();
  const s=data.surveys.find(x=>x.id===id);if(!s)return;
  currentSurveyId=id;
  const allResponses=data.responses[id]||[];

  // Build dept filter options
  const deptSet = {};
  allResponses.forEach(r => { const d=(r.respondent&&r.respondent.department)?r.respondent.department:'(미지정)'; deptSet[d]=(deptSet[d]||0)+1; });
  const filterEl = document.getElementById('report-dept-filter');
  const selectEl = document.getElementById('report-dept-select');
  const countEl = document.getElementById('report-dept-count');
  if (Object.keys(deptSet).length > 1) {
    filterEl.style.display = 'flex';
    const curVal = reportDeptFilter;
    selectEl.innerHTML = '<option value="">전체 부서</option>' + Object.entries(deptSet).sort((a,b)=>b[1]-a[1]).map(([d,c])=>`<option value="${esc(d)}" ${curVal===d?'selected':''}>${esc(d)} (${c}명)</option>`).join('');
  } else { filterEl.style.display = 'none'; }

  // Apply filter
  const responses = reportDeptFilter ? allResponses.filter(r => {
    const d = (r.respondent&&r.respondent.department)?r.respondent.department:'(미지정)';
    return d === reportDeptFilter;
  }) : allResponses;
  countEl.textContent = reportDeptFilter ? `${responses.length}건 / 전체 ${allResponses.length}건` : '';

  const qs=await restoreBlobs(s.questions);
  document.getElementById('report-title').textContent=s.title+' - 통계 리포트';
  const el=document.getElementById('report-content');
  chartInstances.forEach(c=>c.destroy());chartInstances=[];
  if(!responses.length){el.innerHTML='<div class="card"><div class="empty-state"><p>아직 응답 데이터가 없습니다.</p></div></div>';await showPage('report');return;}

  const grpCount=s.questionGroups&&s.questionGroups.length?s.questionGroups.length:0;
  const uniqueRespondents=new Set(responses.filter(r=>r.respondent&&r.respondent.email).map(r=>r.respondent.email)).size;

    }
    html+='</div>';
    });
  });

  html+=`<div class="card"><h3>전체 응답 데이터</h3><div style="overflow-x:auto;"><table class="response-table"><thead><tr><th>#</th><th>응답자</th><th>이메일</th><th>부서</th><th>제출일시</th>`;

async function exportCSV(){

  const responses=data.responses[currentSurveyId]||[];if(!responses.length)return alert('내보낼 데이터가 없습니다.');

  csv+=headers.map(csvEsc).join(',')+'\n';

  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=s.title+'_응답데이터.csv';a.click();URL.revokeObjectURL(url);

let compareCharts=[];

async function populateCompareSelects(){

  const withRes=data.surveys.filter(s=>(data.responses[s.id]||[]).length>0);
  ['compare-a','compare-b'].forEach(id=>{const sel=document.getElementById(id);const cur=sel.value;sel.innerHTML='<option value="">-- 선택 --</option>'+withRes.map(s=>`<option value="${s.id}" ${cur===s.id?'selected':''}>${esc(s.title)} (${(data.responses[s.id]||[]).length}건, ${s.createdAt})</option>`).join('');});

async function runCompare(){
  const idA=document.getElementById('compare-a').value;
  const idB=document.getElementById('compare-b').value;
  if(!idA||!idB)return alert('두 설문을 모두 선택해 주세요.');
  const data=await loadData();
  const sA=data.surveys.find(x=>x.id===idA);const sB=data.surveys.find(x=>x.id===idB);if(!sA||!sB)return;
  const resA=data.responses[idA]||[];const resB=data.responses[idB]||[];
  compareCharts.forEach(c=>c.destroy());compareCharts=[];
  const el=document.getElementById('compare-content');
  const CA='#4361ee',CB='#e63946';

  let html=`<div class="card"><h3>응답 요약 비교</h3><div class="compare-legend"><span class="leg-a">A: ${esc(sA.title)}</span><span class="leg-b">B: ${esc(sB.title)}</span></div><div class="compare-grid"><div class="compare-col"><h4>${esc(sA.title)}</h4><div class="stat-summary"><div class="stat-box"><div class="num">${resA.length}</div><div class="label">응답수</div></div><div class="stat-box"><div class="num">${sA.questions.length}</div><div class="label">질문수</div></div></div></div><div class="compare-col col-b"><h4>${esc(sB.title)}</h4><div class="stat-summary"><div class="stat-box"><div class="num">${resB.length}</div><div class="label">응답수</div></div><div class="stat-box"><div class="num">${sB.questions.length}</div><div class="label">질문수</div></div></div></div></div></div>`;

  const maxQ=Math.max(sA.questions.length,sB.questions.length);
  for(let qi=0;qi<maxQ;qi++){
    const qA=sA.questions[qi],qB=sB.questions[qi];if(!qA&&!qB)continue;
    const titleA=qA?qA.title:'(없음)',titleB=qB?qB.title:'(없음)';
    const same=qA&&qB&&qA.type===qB.type;
    const displayTitle=qA&&qB&&qA.title===qB.title?`Q${qi+1}. ${esc(titleA)}`:`Q${qi+1}. A: ${esc(titleA)} / B: ${esc(titleB)}`;
    html+=`<div class="card compare-row"><div class="compare-q-title">${displayTitle}</div>`;

    if(same&&qA.type==='scale'){
      const vA=resA.map(r=>+r.answers[qi]).filter(v=>!isNaN(v));const vB=resB.map(r=>+r.answers[qi]).filter(v=>!isNaN(v));
      const avgA=vA.length?vA.reduce((a,b)=>a+b,0)/vA.length:0;const avgB=vB.length?vB.reduce((a,b)=>a+b,0)/vB.length:0;
      const diff=avgB-avgA;const dc=diff>0.1?'up':diff<-0.1?'down':'neutral';const ds=diff>0?'+':'';
      html+=`<div class="compare-legend"><span class="leg-a">A</span><span class="leg-b">B</span></div><div class="compare-grid"><div class="compare-col"><div class="stat-summary"><div class="stat-box"><div class="num">${avgA.toFixed(2)}</div><div class="label">평균</div></div><div class="stat-box"><div class="num">${vA.length?getMedian(vA):'-'}</div><div class="label">중앙값</div></div></div></div><div class="compare-col col-b"><div class="stat-summary"><div class="stat-box"><div class="num">${avgB.toFixed(2)}<span class="delta ${dc}">${ds}${diff.toFixed(2)}</span></div><div class="label">평균</div></div><div class="stat-box"><div class="num">${vB.length?getMedian(vB):'-'}</div><div class="label">중앙값</div></div></div></div></div><div style="max-width:600px;margin:16px auto;"><canvas id="cmp_chart_${qi}"></canvas></div>`;
    } else if(same&&(qA.type==='radio'||qA.type==='checkbox')){
      const allOpts=[...new Set([...(qA.options||[]),...(qB.options||[])])];
      const cA={},cB={};allOpts.forEach(o=>{cA[o]=0;cB[o]=0;});
      resA.forEach(r=>{const a=r.answers[qi];if(Array.isArray(a))a.forEach(v=>cA[v]=(cA[v]||0)+1);else if(a)cA[a]=(cA[a]||0)+1;});
      resB.forEach(r=>{const a=r.answers[qi];if(Array.isArray(a))a.forEach(v=>cB[v]=(cB[v]||0)+1);else if(a)cB[a]=(cB[a]||0)+1;});
      html+=`<div class="compare-legend"><span class="leg-a">A (${resA.length}건)</span><span class="leg-b">B (${resB.length}건)</span></div>`;
      allOpts.forEach(opt=>{const pA=resA.length?Math.round(cA[opt]/resA.length*100):0;const pB=resB.length?Math.round(cB[opt]/resB.length*100):0;const d=pB-pA;const dc=d>0?'up':d<0?'down':'neutral';
        html+=`<div style="margin-bottom:10px;"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px;"><span style="font-weight:600;">${esc(opt)}</span><span>A:${pA}% / B:${pB}%<span class="delta ${dc}">(${d>0?'+':''}${d}%p)</span></span></div><div style="position:relative;height:24px;background:#e5e7eb;border-radius:5px;overflow:hidden;"><div style="position:absolute;top:0;left:0;height:50%;width:${pA}%;background:${CA};opacity:.75;"></div><div style="position:absolute;bottom:0;left:0;height:50%;width:${pB}%;background:${CB};opacity:.75;"></div></div></div>`;
      });
      html+=`<div style="max-width:600px;margin:16px auto;"><canvas id="cmp_chart_${qi}"></canvas></div>`;
    } else {
      html+=`<div class="compare-grid">`;
      [{q:qA,res:resA,l:'A'},{q:qB,res:resB,l:'B'}].forEach(({q,res,l})=>{
        html+=`<div class="compare-col ${l==='B'?'col-b':''}">`;
        if(!q)html+='<p style="color:#9ca3af;">해당 질문 없음</p>';
        else if(q.type==='text'){const ans=res.map(r=>r.answers[qi]).filter(a=>a);html+=`<p style="font-size:13px;color:#6b7280;">주관식 ${ans.length}건</p><div style="max-height:200px;overflow-y:auto;font-size:13px;">`;ans.slice(0,10).forEach(a=>{html+=`<div style="padding:6px 0;border-bottom:1px solid #eee;">${esc(a)}</div>`;});html+='</div>';}
        else html+=`<p style="color:#9ca3af;">타입: ${q.type}</p>`;
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  }
  el.innerHTML=html;

  setTimeout(()=>{
    for(let qi=0;qi<maxQ;qi++){
      const qA=sA.questions[qi],qB=sB.questions[qi];if(!qA||!qB||qA.type!==qB.type)continue;
      const cv=document.getElementById('cmp_chart_'+qi);if(!cv)continue;
      if(qA.type==='scale'){
        const dA={},dB={};for(let i=qA.scaleMin||1;i<=qA.scaleMax||5;i++){dA[i]=0;dB[i]=0;}
        resA.forEach(r=>{const v=+r.answers[qi];if(!isNaN(v))dA[v]=(dA[v]||0)+1;});
        resB.forEach(r=>{const v=+r.answers[qi];if(!isNaN(v))dB[v]=(dB[v]||0)+1;});
        compareCharts.push(new Chart(cv,{type:'bar',data:{labels:Object.keys(dA).map(k=>k+'점'),datasets:[{label:'A: '+sA.title,data:Object.values(dA),backgroundColor:CA+'bb'},{label:'B: '+sB.title,data:Object.values(dB),backgroundColor:CB+'bb'}]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}}}));
      }
      if(qA.type==='radio'||qA.type==='checkbox'){
        const allOpts=[...new Set([...(qA.options||[]),...(qB.options||[])])];
        const cA={},cB={};allOpts.forEach(o=>{cA[o]=0;cB[o]=0;});
        resA.forEach(r=>{const a=r.answers[qi];if(Array.isArray(a))a.forEach(v=>cA[v]=(cA[v]||0)+1);else if(a)cA[a]=(cA[a]||0)+1;});
        resB.forEach(r=>{const a=r.answers[qi];if(Array.isArray(a))a.forEach(v=>cB[v]=(cB[v]||0)+1);else if(a)cB[a]=(cB[a]||0)+1;});
        compareCharts.push(new Chart(cv,{type:'bar',data:{labels:allOpts,datasets:[{label:'A',data:allOpts.map(o=>resA.length?Math.round(cA[o]/resA.length*100):0),backgroundColor:CA+'bb'},{label:'B',data:allOpts.map(o=>resB.length?Math.round(cB[o]/resB.length*100):0),backgroundColor:CB+'bb'}]},options:{responsive:true,indexAxis:'y',plugins:{legend:{position:'bottom'}},scales:{x:{beginAtZero:true,max:100,ticks:{callback:v=>v+'%'}}}}}));
      }
    }
  },100);
}

// INIT

async function resetDB(){
  if(_db){_db.close();_db=null;}
  return new Promise((resolve,reject)=>{
    const req=indexedDB.deleteDatabase(DB_NAME);
    req.onsuccess=()=>resolve();
    req.onerror=()=>reject(req.error);
  });
}

async function init(){
  // #reset 해시가 있으면 DB 삭제 후 재로딩
  if(location.hash==='#reset'){
    history.replaceState(null,'',location.pathname);
    try{ await resetDB(); }catch(e){ console.warn('DB reset failed',e); }
    localStorage.removeItem('survey_app_data');
    location.reload();
    return;
  }
  await openDB();
  await migrateFromLocalStorage();
  await seedSampleData();
  await renderSurveyList();
  renderQuestions();
  renderGroupTags();

  // MSAL init
  restoreUser();
  initMsal();
  updateAuthUI();
  if (msalInstance) {
    await trySilentLogin();
    if (currentUser) fetchADDepartments().then(() => console.log('AD departments cached'));
  }

  // Show DB info
  const keys=await idbGetAllKeys('blobs');
  document.getElementById('db-info').textContent=`IndexedDB | Blobs: ${keys.length}`;
}

document.addEventListener('DOMContentLoaded', init);
document.querySelectorAll('nav button')[1].addEventListener('click',()=>{if(!document.getElementById('edit-id').value)resetCreateForm();});
</script>
